name: Python File Writter CI

on:
    push:
        branches: ["main"]
    pull_request: 
        branches: ["main"]

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
          #steps 1: checkout a repository
          - name: Checkout code
            uses: actions/checkout@v3
          # step 2: setup python
          - name: Set up Python
            uses: actions/setup-python@v4
            with:
                python-version: '3.10'
            #step 3: instal dependencies
          - name: Install dependencies
            run: pip install pytest
            
            #step 4: Run Tests
          - name: Run tests
            run: python test_file_writer.py
            

          #step 5: create a source folder

          - name: Create source Folder
            run: |
              mkdir -p src
              cp *.py src/

          # step 6: package Build output as zip
          - name: Package Build output as ZIP
            run: |
              mkdir output
              cp -r src output/
              zip -r build.zip output/
              
          # step 7: Upload artifacts
          - name: Upload artifact
            uses: actions/upload-artifact@v4
            with:
              name: build-zip
              path: build.zip
          # step 8: Notify Email
          - name: Notify Success Via Email
            if: success()
            uses: dawidd6/action-send-mail@v3
            with:
              server_address: smtp.gmail.com
              server_port: 587
